schema_version = 1
name = "shane-xfinity"
description = "Shane's Xfinity XB8 network in San Francisco"

[router]
kind = "xfinity-xb8"
managed = false
supports_vlans = false

[ipv6]
mode = "router-advertised"
observed_prefix = "2601:645:8a02:6610::/64"
stability = "dynamic"
publish_public_aaaa = false

[segments.main]
kind = "lan"
ipv4_cidr = "10.214.90.0/24"
ipv4_gateway = "10.214.90.1"
vlan_id = 0

[hosts.nexus.interfaces.lan]
segment = "main"
ipv4 = "10.214.90.194"
ipv6_mode = "slaac"

[hosts.eclipse.interfaces.wifi]
segment = "main"
ipv6_mode = "slaac"

[tailscale.hosts.nexus]
enabled = true
advertise_routes = []
accept_dns = false
exit_node = false

[tailscale.hosts.eclipse]
enabled = true
advertise_routes = []
accept_dns = false
exit_node = false

[dns.recursion]
allow_ipv4 = ["10.214.90.0/24", "100.64.0.0/10"]
allow_ipv6 = ["::1/128", "fd7a:115c:a1e0::/48"]
