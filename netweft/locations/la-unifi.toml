schema_version = 1
name = "la-unifi"
description = "Historical Los Angeles UniFi network"

[router]
kind = "unifi"
managed = true
supports_vlans = true

[ipv6]
mode = "disabled"
stability = "dynamic"
publish_public_aaaa = false

[segments.core]
kind = "lan"
ipv4_cidr = "10.29.25.0/24"
ipv4_gateway = "10.29.25.1"
vlan_id = 1

[segments.home]
kind = "vlan"
ipv4_cidr = "10.29.26.0/24"
ipv4_gateway = "10.29.26.1"
vlan_id = 10

[segments.lab]
kind = "vlan"
ipv4_cidr = "10.29.29.0/24"
ipv4_gateway = "10.29.29.1"
vlan_id = 20

[hosts.nexus.interfaces.lan]
segment = "core"
ipv4 = "10.29.25.10"
ipv6_mode = "disabled"
